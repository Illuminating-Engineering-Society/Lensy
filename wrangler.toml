# Lensy - IES AI-Powered Standards Assistant
# Cloudflare Workers Configuration
#
# Before deploying, run these commands to create resources and fill in the IDs below:
#
#   wrangler r2 bucket create ies-standards-pdfs
#   wrangler d1 create ies-metadata          → copy database_id below
#   wrangler vectorize create ies-standards-vectors --dimensions=768 --metric=cosine
#   wrangler vectorize create ies-standards-deprecated-vectors --dimensions=768 --metric=cosine
#   wrangler kv namespace create ies-sessions  → copy id below
#
# Metadata indexes (required for filtered Vectorize queries — filters only
# apply to vectors inserted AFTER the index exists, so create these before
# ingesting; re-ingest afterwards if they were added later):
#   wrangler vectorize create-metadata-index ies-standards-vectors --property-name=standard_code --type=string
#   wrangler vectorize create-metadata-index ies-standards-vectors --property-name=chunk_type --type=string
#     (chunk_type powers the References-only search mode; without it the
#      reference-scoped query falls back to the shared top-K pool)
#
# Then set secrets (do NOT commit real keys):
#   wrangler secret put LUCIUS_API_SECRET    ← REQUIRED before production deploy:
#                                              ingest + admin endpoints fail closed
#                                              without it when ENVIRONMENT=production
#   wrangler secret put VITRIUM_API_KEY
#   wrangler secret put SHAREPOINT_TOKEN

name = "lucius-api"
main = "src/workers/api.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── R2: PDF Storage ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "PDFS"
bucket_name = "ies-standards-pdfs"

# ─── D1: Structured Data (Applications, Projects) ────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ies-metadata"
database_id = "79936b28-a632-487d-89ee-4e57af330ecd"

# ─── Vectorize: Semantic Search Index ────────────────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "ies-standards-vectors"

# Deprecated standards live in a SEPARATE index: they are only queried for
# version-comparison searches ("what's new in RP-6?"), never crowd the main
# index's topK pool, and are structurally unreachable from any future
# external API (which only ever gets the main index).
[[vectorize]]
binding = "VECTORIZE_DEPRECATED"
index_name = "ies-standards-deprecated-vectors"

# ─── KV: Session & Cache ─────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "42532fedadc54caf899f190ec3d7eea7"

# ─── Workers AI: Embeddings + AI Summaries ───────────────────────────────────
[ai]
binding = "AI"

# ─── Rate Limiting: /api/search (Workers Rate Limiting API) ──────────────────
# Protects the Workers AI budget from abusive clients. Keyed by client IP;
# 60 searches/min is far above any human usage. The Worker fails OPEN if the
# binding is missing or errors, so removing this block only removes the limit.
[[unsafe.bindings]]
name = "SEARCH_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# ─── Environment Variables (non-secret) ──────────────────────────────────────
[vars]
VITRIUM_API_URL = "https://api.vitrium.com"
# Viewer links are NOT constructed from a base URL: Vitrium's web viewer uses
# opaque short-code URLs (https://view.protectedpdf.com/XXXXXX) stored per
# standard in D1 (standards.vitrium_web_url), populated by
# scripts/sync-metadata.js --csv from Vitrium's document export.
ENVIRONMENT = "production"

# Secrets set via `wrangler secret put`:
# VITRIUM_API_KEY
# SHAREPOINT_TOKEN

# ─── Routes / Custom Domain ───────────────────────────────────────────────────
# Serves the Worker at lensy.ies.org instead of the default *.workers.dev URL.
#
# REQUIRES the ies.org DNS zone (or a delegated lensy.ies.org zone) to already
# be present in this Cloudflare account — that's a manual step, done once, via
# either:
#   (a) the "Domains" tab on this Worker in the dashboard → Add Custom Domain, or
#   (b) letting this route provision automatically on `wrangler deploy` /
#       Workers Builds, IF the zone is already in the account.
# If the zone is NOT in this account yet, deploy will fail with a clear error
# naming the missing zone — that's expected until IES's DNS is added/delegated
# here. Removing this block does not affect the *.workers.dev URL.
[[routes]]
pattern = "lensy.ies.org"
custom_domain = true

[triggers]
crons = []  # Add scheduled tasks here if needed

# ─── Development ──────────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

[assets]
directory = "src/frontend"
