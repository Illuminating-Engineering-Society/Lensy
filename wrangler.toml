# Lensy - IES AI-Powered Standards Assistant
# Cloudflare Workers Configuration
#
# Before deploying, run these commands to create resources and fill in the IDs below:
#
#   wrangler r2 bucket create ies-standards-pdfs
#   wrangler d1 create ies-metadata          → copy database_id below
#   wrangler vectorize create ies-standards-vectors --dimensions=768 --metric=cosine
#   wrangler vectorize create ies-standards-deprecated-vectors --dimensions=768 --metric=cosine
#   wrangler kv namespace create ies-sessions  → copy id below
#
# Then set secrets (do NOT commit real keys):
#   wrangler secret put VITRIUM_API_KEY
#   wrangler secret put SHAREPOINT_TOKEN

name = "lucius-api"
main = "src/workers/api.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── R2: PDF Storage ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "PDFS"
bucket_name = "ies-standards-pdfs"

# ─── D1: Structured Data (Applications, Projects) ────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ies-metadata"
database_id = "79936b28-a632-487d-89ee-4e57af330ecd"

# ─── Vectorize: Semantic Search Index ────────────────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "ies-standards-vectors"

# Deprecated standards live in a SEPARATE index: they are only queried for
# version-comparison searches ("what's new in RP-6?"), never crowd the main
# index's topK pool, and are structurally unreachable from any future
# external API (which only ever gets the main index).
[[vectorize]]
binding = "VECTORIZE_DEPRECATED"
index_name = "ies-standards-deprecated-vectors"

# ─── KV: Session & Cache ─────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "42532fedadc54caf899f190ec3d7eea7"

# ─── Workers AI: Embeddings + AI Summaries ───────────────────────────────────
[ai]
binding = "AI"

# ─── Environment Variables (non-secret) ──────────────────────────────────────
[vars]
VITRIUM_API_URL = "https://api.vitrium.com"
# Viewer links are NOT constructed from a base URL: Vitrium's web viewer uses
# opaque short-code URLs (https://view.protectedpdf.com/XXXXXX) stored per
# standard in D1 (standards.vitrium_web_url), populated by
# scripts/sync-metadata.js --csv from Vitrium's document export.
ENVIRONMENT = "production"

# Secrets set via `wrangler secret put`:
# VITRIUM_API_KEY
# SHAREPOINT_TOKEN

# ─── Routes ───────────────────────────────────────────────────────────────────
[triggers]
crons = []  # Add scheduled tasks here if needed

# ─── Development ──────────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

[assets]
directory = "src/frontend"
